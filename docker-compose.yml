services:
  socialite:
    image: socialite-app:latest
    container_name: socialite
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - proxy_network
    labels:
      # TRAEFIK
      - traefik.enable=true
      - traefik.docker.network=proxy_network
      - traefik.http.routers.socialite.rule=Host(`calendar.apoapsis.xyz`)
      - traefik.http.routers.socialite.entrypoints=websecure
      - traefik.http.services.socialite.loadbalancer.server.port=80
      - traefik.http.routers.socialite.tls=true
      # HOMEPAGE
      - homepage.group=Containers
      - homepage.name=Homepage
      - homepage.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/synology-calendar.png
      - homepage.href=https://socialite.apoapsis.xyz
      - homepage.description=Socialite Calendar
networks:
  proxy_network:
    external: true